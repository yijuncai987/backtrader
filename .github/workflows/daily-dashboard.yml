name: Daily A-share dashboard

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/daily-dashboard.yml"
  schedule:
    # 01:00 Asia/Shanghai. GitHub Actions cron uses UTC.
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dashboard.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dashboard.txt

      - name: Generate dashboard
        run: |
          python daily_a_share_value_dashboard.py \
            --output docs/index.html \
            --cache-dir cache/a_share_value_dashboard \
            --data-dir data/a_share \
            --refresh \
            --price-workers 3 \
            --spot-workers 2 \
            --request-pause 0.8 \
            --request-retries 4 \
            --spot-timeout 30 \
            --batch-timeout-seconds 18000

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/index.csv data/a_share
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
          else
            git commit -m "Update daily dashboard data"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
